name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  phpstan:
    name: PHPStan (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported version (plan §3) and the most recent stable release.
        php: ['8.2', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          ini-values: memory_limit=-1

      - run: composer install --no-interaction --prefer-dist

      - run: vendor/bin/phpstan analyse --no-progress

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.5']
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          ini-values: memory_limit=-1

      - run: composer install --no-interaction --prefer-dist

      - run: vendor/bin/phpunit

  build-phar:
    name: Build PHAR
    needs: [phpstan, phpunit]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
          ini-values: memory_limit=-1

      - name: Build bin/puml-splitter.phar
        run: bash scripts/build-phar.sh

      - name: Smoke-test the PHAR
        run: |
          php bin/puml-splitter.phar split --help
          php bin/puml-splitter.phar split tests/fixtures/very-large.puml --dry-run

      - uses: actions/upload-artifact@v4
        with:
          name: puml-splitter.phar
          path: bin/puml-splitter.phar
          if-no-files-found: error
